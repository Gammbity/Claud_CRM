# BTEC D.P7 & D.P8 — CI/CD Pipeline
# Stages: lint → test → build (parallel) → deploy

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/crm-backend
  IMAGE_FRONTEND: ${{ github.repository }}/crm-frontend

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install & lint backend
        working-directory: backend
        run: npm ci && npm run lint

      - name: Install & lint frontend
        working-directory: frontend
        run: npm ci && npm run lint

  # ─────────────────────────────────────────
  # Stage 2: Test (with PostgreSQL service)
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

      - name: Push DB schema
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          JWT_SECRET: test-secret-32-characters-minimum
          JWT_EXPIRES: 1h

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ─────────────────────────────────────────
  # Stage 3a: Build Backend Image (parallel)
  # ─────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LC}/crm-backend" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          target: production

  # ─────────────────────────────────────────
  # Stage 3b: Build Frontend Image (parallel)
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${REPO_LC}/crm-frontend" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          target: production

  # ─────────────────────────────────────────
  # Stage 4: Deploy to AWS EC2
  # Only on main branch pushes
  # BTEC D.P8: Automated zero-downtime deployment
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.build-backend.outputs.image-tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: GH_TOKEN,GH_ACTOR,GH_REPO,IMAGE_TAG
          script: |
            set -e

            # ── 1. Install Docker if missing ──────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # ── 2. Install Docker Compose plugin if missing ───────────
            if ! sudo docker compose version &> /dev/null 2>&1; then
              echo "Docker Compose plugin not found — installing..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "Docker:         $(sudo docker --version)"
            echo "Docker Compose: $(sudo docker compose version)"

            # ── 3. Ensure project directory exists ────────────────────
            sudo mkdir -p /opt/crm-cloud
            sudo chown "$USER":"$USER" /opt/crm-cloud

            # ── 4. Pull latest code ────────────────────────────────────
            GIT_URL="https://${GH_ACTOR}:${GH_TOKEN}@github.com/${GH_REPO}.git"
            if [ ! -d /opt/crm-cloud/.git ]; then
              git clone "$GIT_URL" /opt/crm-cloud
            fi
            cd /opt/crm-cloud
            git remote set-url origin "$GIT_URL"
            git fetch origin main
            git reset --hard origin/main

            # ── 5. Login to GitHub Container Registry ─────────────────
            echo "${GH_TOKEN}" | sudo docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            # ── 6. Set environment variables ──────────────────────────
            export REGISTRY=ghcr.io/$(echo "${GH_REPO}" | tr '[:upper:]' '[:lower:]')

            {
              echo "IMAGE_TAG=${IMAGE_TAG}"
              echo "REGISTRY=${REGISTRY}"
              echo "POSTGRES_USER=crmuser"
              echo "POSTGRES_PASSWORD=crmpassword123"
              echo "POSTGRES_DB=crmdb"
              echo "JWT_SECRET=crm-jwt-secret-key-production-2024!!"
              echo "JWT_EXPIRES=7d"
              echo "CORS_ORIGIN=https://khuja.duckdns.org"
              echo "LOG_LEVEL=info"
              echo "HTTP_PORT=80"
            } > .env

            # ── 7. Pull new images ────────────────────────────────────
            sudo docker compose pull backend frontend

            # ── 8. Stop old containers + wipe DB volume (fresh creds) ─
            sudo docker compose down -v 2>/dev/null || true

            # ── 9. Start postgres ─────────────────────────────────────
            sudo docker compose up -d postgres
            echo "Waiting for postgres to be healthy..."
            for i in $(seq 1 30); do
              if sudo docker compose ps postgres 2>/dev/null | grep -q "(healthy)"; then
                echo "Postgres is healthy"
                break
              fi
              echo "  attempt $i/30..."
              sleep 3
            done

            # ── 10. Start backend ─────────────────────────────────────
            sudo docker compose up -d --no-deps backend
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 30); do
              if sudo docker compose ps backend 2>/dev/null | grep -q "(healthy)"; then
                echo "Backend is healthy"
                break
              fi
              echo "  attempt $i/30..."
              sleep 3
            done

            # ── 11. Get SSL certificate (port 80 is free — nginx not running yet) ─
            sudo apt-get install -y certbot openssl 2>/dev/null
            CERT_DIR="/etc/letsencrypt/live/khuja.duckdns.org"
            if ! sudo test -f "${CERT_DIR}/fullchain.pem"; then
              echo "Getting SSL certificate from Let's Encrypt..."
              sudo certbot certonly --standalone \
                -d khuja.duckdns.org \
                --non-interactive --agree-tos \
                --email admin@crmcloud.com \
                --keep-until-expiring 2>/dev/null \
              || {
                echo "Certbot failed — creating self-signed cert as fallback..."
                sudo mkdir -p "${CERT_DIR}"
                sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout "${CERT_DIR}/privkey.pem" \
                  -out "${CERT_DIR}/fullchain.pem" \
                  -subj "/CN=khuja.duckdns.org" 2>/dev/null
              }
            else
              echo "Certificate exists — renewing if near expiry..."
              sudo certbot renew --quiet 2>/dev/null || true
            fi
            sudo mkdir -p /var/www/certbot

            # ── 12. Start frontend (wait healthy) ─────────────────────
            sudo docker compose up -d --no-deps frontend
            echo "Waiting for frontend to be healthy..."
            for i in $(seq 1 20); do
              if sudo docker compose ps frontend 2>/dev/null | grep -q "(healthy)"; then
                echo "Frontend is healthy"
                break
              fi
              echo "  attempt $i/20..."
              sleep 3
            done

            # ── 13. Start nginx ───────────────────────────────────────
            sudo docker compose up -d --no-deps nginx
            sleep 10

            # ── 14. Verify deployment ─────────────────────────────────
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health 2>/dev/null || true)
            echo "Health check status: ${HTTP_STATUS}"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed"
            else
              echo "Health check returned ${HTTP_STATUS} — showing logs:"
              sudo docker compose logs --tail=20 backend
              sudo docker compose logs --tail=10 nginx
              exit 1
            fi

            # ── 15. Cleanup old images ─────────────────────────────────
            sudo docker image prune -f

            echo "Deployment complete — SHA: ${IMAGE_TAG}"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to EC2 succeeded — SHA: ${{ needs.build-backend.outputs.image-tag }}"
          else
            echo "❌ Deployment failed — SHA: ${{ needs.build-backend.outputs.image-tag }}"
          fi

# BTEC D.P7 & D.P8 — CI/CD Pipeline
# Stages: lint → test → build → deploy

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/crm-backend
  IMAGE_FRONTEND: ${{ github.repository }}/crm-frontend

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # ─────────────────────────────────────────
  # Stage 2: Test (with PostgreSQL service)
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

      - name: Push DB schema
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          JWT_SECRET: test-secret-32-characters-minimum
          JWT_EXPIRES: 1h

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ─────────────────────────────────────────
  # Stage 3: Build Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=${{ env.REGISTRY }}/${REPO_LC}/crm-backend" >> $GITHUB_OUTPUT
          echo "frontend=${{ env.REGISTRY }}/${REPO_LC}/crm-frontend" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.backend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.frontend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ─────────────────────────────────────────
  # Stage 4: Deploy to AWS EC2
  # Only on main branch pushes
  # BTEC D.P8: Automated zero-downtime deployment
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: GH_TOKEN,GH_ACTOR,GH_REPO,IMAGE_TAG
          script: |
            set -e

            # ── 1. Install Docker if missing ──────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # ── 2. Install Docker Compose plugin if missing ───────────
            if ! sudo docker compose version &> /dev/null 2>&1; then
              echo "Docker Compose plugin not found — installing..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "Docker:         $(sudo docker --version)"
            echo "Docker Compose: $(sudo docker compose version)"

            # ── 3. Ensure project directory exists ────────────────────
            sudo mkdir -p /opt/crm-cloud
            sudo chown "$USER":"$USER" /opt/crm-cloud

            # ── 4. Pull latest code ────────────────────────────────────
            GIT_URL="https://${GH_ACTOR}:${GH_TOKEN}@github.com/${GH_REPO}.git"
            if [ ! -d /opt/crm-cloud/.git ]; then
              git clone "$GIT_URL" /opt/crm-cloud
            fi
            cd /opt/crm-cloud
            git remote set-url origin "$GIT_URL"
            git fetch origin main
            git reset --hard origin/main

            # ── 5. Login to GitHub Container Registry ─────────────────
            echo "${GH_TOKEN}" | sudo docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            # ── 6. Set environment variables ──────────────────────────
            export REGISTRY=ghcr.io/$(echo "${GH_REPO}" | tr '[:upper:]' '[:lower:]')

            {
              echo "IMAGE_TAG=${IMAGE_TAG}"
              echo "REGISTRY=${REGISTRY}"
              echo "POSTGRES_USER=crmuser"
              echo "POSTGRES_PASSWORD=crmpassword123"
              echo "POSTGRES_DB=crmdb"
              echo "JWT_SECRET=crm-jwt-secret-key-production-2024!!"
              echo "JWT_EXPIRES=7d"
              echo "CORS_ORIGIN=http://khuja.duckdns.org"
              echo "LOG_LEVEL=info"
              echo "HTTP_PORT=80"
            } > .env

            # ── 7. Pull new images ────────────────────────────────────
            sudo docker compose pull backend frontend

            # ── 8. Start postgres first (required by backend) ─────────
            sudo docker compose up -d postgres
            echo "Waiting for postgres to be healthy..."
            timeout 90 sh -c \
              'until sudo docker compose ps postgres 2>/dev/null | grep -q "(healthy)"; do sleep 3; done' \
              || echo "Postgres health timeout — continuing anyway"

            # ── 9. Zero-downtime rolling backend update ───────────────
            sudo docker compose up -d --no-deps backend
            echo "Waiting for backend to be healthy..."
            timeout 90 sh -c \
              'until sudo docker compose ps backend 2>/dev/null | grep -q "(healthy)"; do sleep 3; done' \
              || echo "Backend health timeout — continuing anyway"

            # ── 10. Update frontend ───────────────────────────────────
            sudo docker compose up -d --no-deps frontend

            # ── 11. Start / reload nginx ──────────────────────────────
            sudo docker compose up -d --no-deps nginx
            sleep 5
            sudo docker compose exec -T nginx nginx -s reload 2>/dev/null || true

            # ── 12. Verify deployment ─────────────────────────────────
            sleep 5
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed — HTTP $HTTP_STATUS"
            else
              echo "Health check returned HTTP $HTTP_STATUS — check logs"
              sudo docker compose logs --tail=20 backend
              exit 1
            fi

            # ── 13. Cleanup old images ─────────────────────────────────
            sudo docker image prune -f

            echo "Deployment complete — SHA: ${IMAGE_TAG}"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to EC2 succeeded — SHA: ${{ needs.build.outputs.image-tag }}"
          else
            echo "❌ Deployment failed — SHA: ${{ needs.build.outputs.image-tag }}"
          fi

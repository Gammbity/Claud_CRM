# Nginx config optimized for Docker Compose --scale backend=N
# Uses Docker DNS resolver to discover all backend container IPs dynamically

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format lb '$remote_addr [$time_local] "$request" $status '
                  'upstream=$upstream_addr instance_time=$upstream_response_time';
    access_log /var/log/nginx/access.log lb;

    # Use Docker's internal DNS resolver for dynamic upstream discovery
    resolver 127.0.0.11 valid=5s;

    # Shared memory zone for upstream state
    upstream crm_backend {
        # Docker Compose DNS returns all IPs for 'backend' service
        server backend:3001;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # KEY HEADER: Shows which backend instance handled this request
            # Watch this change with each request — proves load balancing!
            add_header X-Backend-Instance $upstream_addr always;
            add_header X-Response-Time $request_time always;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        location /nginx-status {
            stub_status on;
            allow all;
        }
    }
}

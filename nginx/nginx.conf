```nginx
# BTEC C.P6 & C.M3 — Nginx Load Balancer Configuration
# HTTPS + Reverse Proxy + Load Balancer

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured access log
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml;

    # -----------------------------
    # Backend upstream
    # -----------------------------
    upstream crm_backend {
        server backend:3001;

        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # -----------------------------
    # Rate limiting
    # -----------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # =========================================================
    # HTTP -> HTTPS REDIRECT
    # =========================================================
    server {
        listen 80;
        server_name khuja.duckdns.org;

        return 301 https://$host$request_uri;
    }

    # =========================================================
    # HTTPS SERVER
    # =========================================================
    server {
        listen 443 ssl http2;
        server_name khuja.duckdns.org;

        # SSL CERTIFICATES
        ssl_certificate /etc/letsencrypt/live/khuja.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/khuja.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # =====================================================
        # API
        # =====================================================
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://crm_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            add_header X-Backend-Instance $upstream_addr always;
            add_header X-Response-Time $request_time always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =====================================================
        # AUTH API
        # =====================================================
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://crm_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Backend-Instance $upstream_addr always;
        }

        # =====================================================
        # FRONTEND
        # =====================================================
        location / {
            proxy_pass http://frontend:80;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_cache_bypass $http_upgrade;
        }

        # =====================================================
        # NGINX STATUS
        # =====================================================
        location /nginx-status {
            stub_status on;

            allow 127.0.0.1;
            allow 10.0.0.0/8;

            deny all;
        }
    }
}

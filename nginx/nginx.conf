# BTEC C.P6 & C.M3 — Nginx Load Balancer Configuration
# Demonstrates: round-robin load balancing, health checks, upstream grouping

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured access log — BTEC D.P7: network monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip compression — BTEC D.P7: performance optimization
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- UPSTREAM: Backend API servers (Round-Robin Load Balancing) ---
    # BTEC C.M3/C.D2: scale with docker compose --scale backend=N
    upstream crm_backend {
        # Round-robin is the default algorithm in Nginx
        # Each request goes to the next server in order
        server backend:3001;
        # When scaling: docker compose -f docker-compose.scale.yml up --scale backend=3
        # Nginx resolves 'backend' to multiple container IPs via Docker DNS

        keepalive 32;           # Keep 32 connections per worker to upstream
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Rate limiting zone — BTEC D.P7: DoS protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # --- SERVER: Main entry point ---
    server {
        listen 80;
        server_name _;

        # Security headers — BTEC D.P8
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- API Proxy to Backend ---
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://crm_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # BTEC C.M3: This header shows WHICH backend instance served the request
            # Proves load balancing is working — each request may show different upstream
            add_header X-Backend-Instance $upstream_addr always;
            add_header X-Response-Time $request_time always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Health check passes through — used by ALB & ASG
            location /api/health {
                proxy_pass http://crm_backend;
                access_log off;
            }
        }

        # Stricter rate limit for auth endpoints
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Backend-Instance $upstream_addr always;
        }

        # --- Frontend Static Files ---
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Nginx status (for monitoring — BTEC D.M4)
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}

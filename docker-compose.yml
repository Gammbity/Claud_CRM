# BTEC C.P5 & C.P6 — Docker Compose: Full stack orchestration
# Services: postgres, backend, frontend, nginx
# BTEC A.P2: Demonstrates internal container network communication

networks:
  crm-network:
    driver: bridge
    # Internal network — containers communicate via service names (DNS)
    # Equivalent to private subnet in AWS VPC (BTEC B.P3)

volumes:
  postgres-data:
    driver: local
  nginx-logs:
    driver: local

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crmpassword}
      POSTGRES_DB: ${POSTGRES_DB:-crmdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crmuser} -d ${POSTGRES_DB:-crmdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # ports:
    #   - "5432:5432"  # Uncomment only for local dev — never expose in production

  # ─────────────────────────────────────────
  # Backend API (Express + Prisma)
  # ─────────────────────────────────────────
  backend:
    image: ${REGISTRY:-ghcr.io/gammbity/cloudcrm}/crm-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-crmuser}:${POSTGRES_PASSWORD:-crmpassword}@postgres:5432/${POSTGRES_DB:-crmdb}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # DB Seed (runs once after backend)
  # ─────────────────────────────────────────
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: >
      sh -c "./node_modules/.bin/ts-node --project tsconfig.seed.json --transpile-only prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crmuser}:${POSTGRES_PASSWORD:-crmpassword}@postgres:5432/${POSTGRES_DB:-crmdb}
    networks:
      - crm-network
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────
  # Frontend (React + Vite → Nginx static)
  # ─────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io/gammbity/cloudcrm}/crm-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    networks:
      - crm-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Nginx — Reverse Proxy & Load Balancer
  # BTEC B.P3/C.P6: Entry point for all traffic
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - crm-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
